name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk libffi-dev libssl-dev libsqlite3-dev zlib1g-dev autoconf libtool pkg-config build-essential libtool-bin
        pip install --user --upgrade buildozer "cython>=3.0.0" virtualenv

    - name: Configure Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # إعداد مسبق للموافقة على التراخيص لتفادي التوقف أو طلب إدخال تفاعلي
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses || true
        echo -e "\n89346eb96b3913019929af2cd10944e53f6a57e3" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license || true
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license || true

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        # البناء المباشر باستخدام خاصية التخطي التلقائي المدمجة في buildozer
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: .buildozer/android/platform/build/dists/*/bin/*.apk
