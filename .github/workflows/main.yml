name: Build APK with Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # هنا نقوم باستدعاء حاوية دوكر مجهزة ومستقرة تماماً لبيلدوزر
    container:
      image: kavu/buildozer:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build APK
      run: |
        # تشغيل البناء مباشرة داخل البيئة المعزولة والمجهزة بالتراخيص
        buildozer android debug
