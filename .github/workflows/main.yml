name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11 (For Android SDK compatibility)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip libffi-dev libssl-dev libsqlite3-dev zlib1g-dev autoconf libtool pkg-config build-essential libtool-bin
        pip install --user --upgrade buildozer "cython>=3.0.0" virtualenv

    - name: Force Download Legacy Android SDK Tools
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk
        wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip -O sdk-tools.zip
        unzip -q sdk-tools.zip -d ~/.buildozer/android/platform/android-sdk
        rm sdk-tools.zip
        
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses || true
        echo -e "\n89346eb96b3913019929af2cd10944e53f6a57e3\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nedb2790f3b379b22db05066fc0289a45e2f1e6f5" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license || true

    - name: Build with Buildozer
      run: |
        # إجبار البيئة على مسار Java 11 وتجاوز الجافا الافتراضية للنظام
        export JAVA_HOME=$JAVA_HOME_11_X64
        export PATH=$JAVA_HOME/bin:$PATH
        export PATH=$PATH:~/.local/bin
        
        # للتأكد من نجاح التحويل قبل البدء
        java -version
        
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: .buildozer/android/platform/build/dists/*/bin/*.apk
