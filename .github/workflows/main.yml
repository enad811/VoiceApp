name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk libffi-dev libssl-dev libsqlite3-dev zlib1g-dev autoconf libtool pkg-config build-essential libtool-bin
        pip install --user --upgrade buildozer "cython>=3.0.0" virtualenv

    - name: Accept Android Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | exec ${{ github.workspace }}/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: .buildozer/android/platform/build/dists/*/bin/*.apk
